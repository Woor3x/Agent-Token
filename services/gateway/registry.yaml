agents:
  doc_assistant:
    upstream: http://doc-assistant:8100
    transport: http
    timeout_ms: 30000
    retry:
      max: 0

  data_agent:
    upstream: http://data-agent:8101
    transport: http
    timeout_ms: 10000
    retry:
      max: 2
      backoff_ms: 200

  web_agent:
    upstream: http://web-agent:8102
    transport: http
    timeout_ms: 15000
    retry:
      max: 1
