## Agent-Token full demo stack.
##
## Six services on a single user-defined bridge so they can resolve each
## other by container name (``feishu-mock``, ``idp-mock``, etc.).
##
## Bring up with:
##     docker compose up --build
##
## Smoke test:
##     curl http://localhost:9100/healthz
##     curl http://localhost:9200/healthz
##     curl http://localhost:8100/healthz

x-common-env: &common-env
  IDP_ISSUER: https://idp.local
  IDP_JWKS_URL: http://idp-mock:9100/jwks
  MOCK_AUTH_SECRET: mock-secret
  GATEWAY_URL: http://gateway-mock:9200
  FEISHU_BASE: http://feishu-mock:9000
  FEISHU_MOCK: "true"
  VERIFY_DPOP: "false"
  LLM_PROVIDER: ${LLM_PROVIDER:-mock}
  ARK_API_KEY: ${ARK_API_KEY:-}
  ARK_MODEL: ${ARK_MODEL:-}
  ARK_BASE: ${ARK_BASE:-https://ark.cn-beijing.volces.com/api/v3}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-}
  OPENAI_BASE: ${OPENAI_BASE:-}

services:

  feishu-mock:
    build: .
    image: agent-token/base
    environment:
      <<: *common-env
      APP_MODULE: services.feishu_mock.main:app
      PORT: "9000"
    ports:
      - "9000:9000"

  gateway-mock:
    build: .
    image: agent-token/base
    environment:
      <<: *common-env
      APP_MODULE: services.gateway_mock.main:app
      PORT: "9200"
      AGENT_DOC_ASSISTANT_URL: http://doc-assistant:8100
      AGENT_DATA_AGENT_URL:    http://data-agent:8101
      AGENT_WEB_AGENT_URL:     http://web-agent:8102
    ports:
      - "9200:9200"
    depends_on:
      - doc-assistant
      - data-agent
      - web-agent

  doc-assistant:
    build: .
    image: agent-token/base
    environment:
      <<: *common-env
      APP_MODULE: agents.doc_assistant.main:app
      PORT: "8100"
    ports:
      - "8100:8100"
    depends_on:
      - feishu-mock
      - idp-mock

  data-agent:
    build: .
    image: agent-token/base
    environment:
      <<: *common-env
      APP_MODULE: agents.data_agent.main:app
      PORT: "8101"
    ports:
      - "8101:8101"
    depends_on:
      - feishu-mock
      - idp-mock

  web-agent:
    build: .
    image: agent-token/base
    environment:
      <<: *common-env
      APP_MODULE: agents.web_agent.main:app
      PORT: "8102"
    ports:
      - "8102:8102"
    depends_on:
      - idp-mock

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  opa:
    image: openpolicyagent/opa:0.63.0
    command: run --server --log-level info /policies /data
    volumes:
      - ./services/opa/policies:/policies:ro
      - ./services/opa/data:/data:ro
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  idp:
    build:
      context: ./services/idp
      dockerfile: Dockerfile
    environment:
      - IDP_ISSUER=https://idp.local
      - IDP_KMS_PASSPHRASE=dev-passphrase-change-in-prod
      - REDIS_URL=redis://redis:6379
      - SQLITE_PATH=/data/idp.db
      - OPA_URL=http://opa:8181
      - ADMIN_TOKEN=admin-secret-token
      - POLICY_VERSION=v1.2.0
      - CAPABILITIES_DIR=/app/capabilities
      - USERS_DIR=/app/users
      - ALLOWED_REDIRECT_URIS=http://localhost:3000/callback,https://web-ui.local/callback
      - ALLOWED_SOURCE_NETS=0.0.0.0/0
    volumes:
      - ./capabilities:/app/capabilities:ro
      - ./users:/app/users:ro
      - idp_data:/data
      - idp_kms:/app/kms/keys
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  idp_data:
  idp_kms:

networks:
  default:
    name: agent-token-net